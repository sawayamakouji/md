<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Markdown Editor</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --panel-2: #f9fafb;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #1f4e79;
      --accent-2: #e8f1f8;
      --danger: #b91c1c;
      --code-bg: #111827;
      --code-text: #f9fafb;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.04);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #4b7ea8);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    button,
    label.button,
    select {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      min-height: 34px;
    }

    button:hover,
    label.button:hover,
    select:hover {
      background: var(--panel-2);
      border-color: #aeb6c2;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: #173b5c;
    }

    button.danger {
      color: var(--danger);
    }

    input[type="color"] {
      width: 34px;
      height: 34px;
      min-width: 34px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      cursor: pointer;
    }

    .color-control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .preview .md-color,
    .preview .md-bg {
      border-radius: 4px;
      padding: 0.04em 0.18em;
    }


    input[type="file"] {
      display: none;
    }

    .filename-box {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }

    .filename-box span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .filename-box input {
      width: 210px;
      max-width: 30vw;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-family: var(--sans);
    }

    .filename-box label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
    }

    .filename-box input[type="checkbox"] {
      width: auto;
      max-width: none;
      margin: 0;
      accent-color: var(--accent);
    }

    .filename-box .mini-button {
      border: 0;
      background: var(--accent-2);
      color: var(--accent);
      min-height: 24px;
      padding: 4px 7px;
      border-radius: 7px;
      font-size: 12px;
    }

    .filename-box .mini-button:hover {
      background: #d7e8f4;
    }

    @media (max-width: 860px) {
      .filename-box {
        width: 100%;
      }

      .filename-box input {
        width: 100%;
        max-width: none;
      }
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      z-index: 9;
    }

    .toolbar .group {
      display: flex;
      gap: 6px;
      padding-right: 8px;
      margin-right: 4px;
      border-right: 1px solid var(--border);
    }

    .toolbar .group:last-child {
      border-right: 0;
    }

    .toolbar button {
      white-space: nowrap;
      min-width: 34px;
      padding: 8px 9px;
      font-weight: 600;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px minmax(0, 1fr);
      gap: 0;
      min-height: 0;
    }

    main.editor-only {
      grid-template-columns: minmax(0, 1fr) 260px;
    }

    main.preview-only {
      grid-template-columns: 260px minmax(0, 1fr);
    }

    main.editor-only .preview-pane,
    main.preview-only .editor-pane {
      display: none;
    }

    main.toc-hidden {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    main.toc-hidden .toc-pane {
      display: none;
    }

    main.editor-only.toc-hidden,
    main.preview-only.toc-hidden {
      grid-template-columns: minmax(0, 1fr);
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
    }

    .editor-pane,
    .toc-pane {
      border-right: 1px solid var(--border);
    }

    .toc-pane {
      background: var(--panel-2);
    }

    .toc-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 10px 10px 18px;
    }

    .toc {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 13px;
      line-height: 1.45;
    }

    .toc a {
      display: block;
      color: var(--text);
      text-decoration: none;
      border-radius: 8px;
      padding: 6px 8px;
      border: 1px solid transparent;
    }

    .toc a:hover,
    .toc a.active {
      background: var(--accent-2);
      border-color: #c7d9e8;
      color: var(--accent);
    }

    .toc .toc-level-1 {
      padding-left: 8px;
      font-weight: 800;
    }

    .toc .toc-level-2 {
      padding-left: 18px;
      font-weight: 650;
    }

    .toc .toc-level-3 {
      padding-left: 30px;
    }

    .toc .toc-level-4 {
      padding-left: 42px;
      font-size: 12.5px;
    }

    .toc .toc-level-5,
    .toc .toc-level-6 {
      padding-left: 54px;
      font-size: 12px;
      color: var(--muted);
    }

    .toc-empty {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .toc-help {
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.55;
    }

    .toc-count {
      white-space: nowrap;
    }

    .pane-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      background: #fff;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 0;
      padding: 18px;
      border: 0;
      outline: 0;
      resize: none;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      background: #fcfcfd;
      tab-size: 2;
    }

    .preview-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: #ffffff;
    }

    .preview {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 34px 60px;
      line-height: 1.8;
      word-break: break-word;
    }

    .preview h1,
    .preview h2,
    .preview h3,
    .preview h4,
    .preview h5,
    .preview h6 {
      line-height: 1.35;
      margin: 1.4em 0 0.55em;
      letter-spacing: -0.02em;
      scroll-margin-top: 18px;
    }

    .preview h1:target,
    .preview h2:target,
    .preview h3:target,
    .preview h4:target,
    .preview h5:target,
    .preview h6:target {
      background: linear-gradient(90deg, var(--accent-2), transparent);
      border-radius: 8px;
    }

    .heading-anchor {
      color: inherit;
      text-decoration: none;
    }

    .preview h1 {
      font-size: 2rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.25em;
    }

    .preview h2 {
      font-size: 1.55rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.25em;
    }

    .preview h3 {
      font-size: 1.25rem;
    }

    .preview p {
      margin: 0.85em 0;
    }

    .preview a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .preview blockquote {
      margin: 1em 0;
      padding: 0.2em 1em;
      color: #374151;
      border-left: 4px solid var(--accent);
      background: var(--accent-2);
      border-radius: 0 10px 10px 0;
    }

    .preview ul,
    .preview ol {
      padding-left: 1.6em;
    }

    .preview li {
      margin: 0.25em 0;
    }

    .preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.2em 0;
      font-size: 14px;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 0 0 1px var(--border);
    }

    .preview th,
    .preview td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      vertical-align: top;
    }

    .preview th {
      background: #eef2f7;
      font-weight: 700;
      text-align: left;
    }

    .preview tr:nth-child(even) td {
      background: #fbfcfe;
    }

    .preview code:not(pre code) {
      font-family: var(--mono);
      background: #eef2f7;
      color: #111827;
      border: 1px solid #d8dee8;
      border-radius: 6px;
      padding: 0.12em 0.35em;
      font-size: 0.92em;
    }

    .code-block {
      position: relative;
      margin: 1.2em 0;
      border-radius: 12px;
      overflow: hidden;
      background: var(--code-bg);
      box-shadow: var(--shadow);
    }

    .code-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 34px;
      padding: 7px 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: #d1d5db;
      background: #0b1220;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .copy-code {
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 7px;
      font-size: 12px;
      background: #1f2937;
      color: #f9fafb;
      border-color: #374151;
    }

    .copy-code:hover {
      background: #374151;
      border-color: #4b5563;
    }

    pre {
      margin: 0;
      padding: 15px 16px;
      overflow: auto;
      color: var(--code-text);
      background: var(--code-bg);
      font-family: var(--mono);
      font-size: 13.5px;
      line-height: 1.65;
    }

    .preview img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .preview hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    .export-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 24px;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 60px;
      height: auto;
      min-height: 100vh;
    }

    .export-toc {
      align-self: start;
      position: sticky;
      top: 18px;
      max-height: calc(100vh - 36px);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .export-toc h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--text);
    }

    .export-layout .preview {
      max-width: none;
      margin: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    @media (max-width: 860px) {
      .export-layout {
        display: block;
        width: auto;
        padding: 12px;
      }

      .export-toc {
        position: static;
        max-height: none;
        margin-bottom: 12px;
      }
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 14px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      z-index: 9;
    }

    .status strong {
      color: var(--text);
      font-weight: 700;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      padding: 10px 13px;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: 0.18s ease;
      z-index: 1000;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-tabs {
      display: none;
      padding: 8px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .mobile-tabs button {
      flex: 1;
    }

    @media (max-width: 860px) {
      body {
        height: 100dvh;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        padding: 10px 12px;
      }

      .brand {
        min-width: 0;
      }

      .controls {
        width: 100%;
        justify-content: flex-start;
      }

      .toolbar {
        padding: 8px 10px;
      }

      .mobile-tabs {
        display: flex;
      }

      main,
      main.editor-only,
      main.preview-only,
      main.toc-hidden,
      main.editor-only.toc-hidden,
      main.preview-only.toc-hidden {
        grid-template-columns: 1fr;
      }

      main.mobile-editor .toc-pane,
      main.mobile-editor .preview-pane,
      main.mobile-toc .editor-pane,
      main.mobile-toc .preview-pane,
      main.mobile-preview .editor-pane,
      main.mobile-preview .toc-pane {
        display: none;
      }

      .editor-pane,
      .toc-pane {
        border-right: 0;
      }

      .preview {
        padding: 20px 18px 48px;
      }

      textarea {
        font-size: 13.5px;
        padding: 14px;
      }
    }

    @media print {
      header,
      .toolbar,
      .pane-title,
      .editor-pane,
      .toc-pane,
      .status,
      .mobile-tabs,
      .toast {
        display: none !important;
      }

      body {
        height: auto;
        overflow: visible;
        background: white;
      }

      main,
      .preview-pane,
      .preview-wrap {
        display: block !important;
        height: auto;
        overflow: visible;
      }

      .preview {
        max-width: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">M↓</div>
      <div>
        <h1>Local Markdown Editor</h1>
        <p>単体HTML・画像貼付・雛形・色変更・リスト自動継続</p>
      </div>
    </div>

    <div class="controls">
      <select id="viewMode" title="表示切替">
        <option value="split">左右分割</option>
        <option value="editor">編集のみ</option>
        <option value="preview">プレビューのみ</option>
      </select>
      <button id="toggleToc" type="button" title="目次ペインの表示切替">目次ON</button>
      <label class="button" for="fileInput">MD読込</label>
      <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" />
      <input id="imageInput" type="file" accept="image/*" multiple />
      <div class="filename-box" title="自動ONの場合は、タイトルと作成日時から保存名を作ります">
        <span>保存名</span>
        <input id="filenameInput" type="text" value="" placeholder="自動: タイトル_作成日時" />
        <label title="ONの場合、保存時にタイトルと作成日時から自動命名します">
          <input id="autoFilename" type="checkbox" checked />
          自動
        </label>
        <button id="refreshFilename" class="mini-button" type="button" title="タイトルと作成日時から保存名を更新">更新</button>
      </div>
      <button id="downloadMd">MD保存</button>
      <button id="downloadHtml">HTML保存</button>
      <button id="printPreview">印刷</button>
      <button id="clearAll" class="danger">クリア</button>
    </div>
  </header>

  <div class="toolbar" aria-label="Markdown toolbar">
    <div class="group">
      <button data-insert="# " title="見出し1">H1</button>
      <button data-insert="## " title="見出し2">H2</button>
      <button data-insert="### " title="見出し3">H3</button>
    </div>
    <div class="group">
      <button data-wrap="**" title="太字">B</button>
      <button data-wrap="*" title="斜体"><em>I</em></button>
      <button data-wrap="~~" title="取り消し線">S</button>
      <button data-wrap="`" title="インラインコード">&lt;/&gt;</button>
    </div>
    <div class="group">
      <span class="color-control" title="選択文字の色を変える">
        <input id="textColorPicker" type="color" value="#b91c1c" />
        <button id="applyTextColor">文字色</button>
      </span>
      <span class="color-control" title="選択文字の背景色を変える">
        <input id="textBgColorPicker" type="color" value="#fff2cc" />
        <button id="applyTextBgColor">文字背景</button>
      </span>
      <span class="color-control" title="画面全体の背景色を変える">
        <input id="appBgColorPicker" type="color" value="#f3f4f6" />
        <button id="applyAppBgColor">全体背景</button>
      </span>
      <button id="resetColorSettings" title="背景色設定を初期化">色リセット</button>
    </div>
    <div class="group">
      <button data-block="quote" title="引用">引用</button>
      <button data-block="ul" title="箇条書き">・リスト</button>
      <button data-block="ol" title="番号リスト">1. リスト</button>
      <button data-block="task" title="タスクリスト">☐ Task</button>
    </div>
    <div class="group">
      <button data-template="code" title="コードブロック">``` code</button>
      <button data-template="table" title="表">表</button>
      <button data-template="link" title="リンク">リンク</button>
      <button data-template="image" title="画像リンク">画像リンク</button>
      <button id="uploadImage" title="画像を本文に埋め込み。大きい画像は自動圧縮">画像挿入</button>
    </div>
    <div class="group">
      <button data-template="hr" title="区切り線">HR</button>
    </div>
    <div class="group">
      <select id="templateSelect" title="文書テンプレート">
        <option value="">雛形を選択</option>
        <option value="business_memo">社内連絡メモ</option>
        <option value="meeting_minutes">議事録</option>
        <option value="weekly_report">週次報告</option>
        <option value="issue_report">課題・障害報告</option>
        <option value="improvement_proposal">業務改善提案</option>
        <option value="measure_plan">施策計画書</option>
        <option value="measure_review">施策振り返り</option>
        <option value="kpi_analysis">KPI・数値分析報告</option>
        <option value="decision_request">判断依頼書</option>
        <option value="a3_framework">A3問題解決</option>
        <option value="raci">RACI整理</option>
        <option value="pdca">PDCA整理</option>
      </select>
      <button id="insertTemplate" title="選択した雛形を本文に挿入">雛形挿入</button>
      <button id="copyMarkdown" title="Markdownをコピー">MDコピー</button>
    </div>
  </div>

  <div class="mobile-tabs">
    <button id="mobileEdit" class="primary">編集</button>
    <button id="mobileToc">目次</button>
    <button id="mobilePreview">プレビュー</button>
  </div>

  <main id="layout">
    <section class="pane editor-pane">
      <div class="pane-title">
        <span>Markdown</span>
        <span id="saveState">未保存</span>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
    </section>

    <section class="pane toc-pane">
      <div class="pane-title">
        <span>目次</span>
        <span id="tocCount" class="toc-count">0件</span>
      </div>
      <div class="toc-scroll">

    const editor = document.getElementById("editor");

    function showToast(message) {

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")

    function safeUrl(url) {

      if (/^(https?:|mailto:|tel:|#|\.\/|\.\.\/|\/)/i.test(trimmed)) {

      return "#";

    function safeImageUrl(url) {
      const trimmed = String(url || "").trim();
      if (/^data:image\/(png|jpeg|jpg|gif|webp|svg\+xml);base64,/i.test(trimmed)) {

      const plain = stripMarkdownForToc(text);
      let base = plain
        .normalize("NFKC")
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s_-]+/gu, "")
        .trim()
        .replace(/[\s_]+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");

      if (!base) base = "heading";

      const count = usedIds.get(base) || 0;
      usedIds.set(base, count + 1);
      return count === 0 ? base : `${base}-${count + 1}`;
    }

    function extractHeadings(markdown) {
      const lines = String(markdown || "").replace(/\r\n?/g, "\n").split("\n");
      const usedIds = new Map();
      const headings = [];
      let inCode = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (/^```/.test(line.trim())) {
          inCode = !inCode;
          continue;
        }
        if (inCode) continue;

        const match = /^(#{1,6})\s+(.+)$/.exec(line);
        if (!match) continue;

        const title = stripMarkdownForToc(match[2]);
        const id = createHeadingId(match[2], usedIds);
        headings.push({
          level: match[1].length,
          rawTitle: match[2],
          title: title || `見出し ${headings.length + 1}`,

          line: i

    function getTextOffsetForLine(text, lineNumber) {

        offset += lines[i].length + 1;

    function jumpToHeading(headingId, lineNumber) {

      escaped = escaped.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
        return `<a href="${safeUrl(url)}" target="_blank" rel="noopener noreferrer">${label}</a>`;
      });

      escaped = escaped.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      escaped = escaped.replace(/__([^_]+)__/g, "<strong>$1</strong>");
      escaped = escaped.replace(/~~([^~]+)~~/g, "<del>$1</del>");
      escaped = escaped.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
      escaped = escaped.replace(/_([^_\n]+)_/g, "<em>$1</em>");

      escaped = escaped.replace(/\{\{color:(#[0-9a-fA-F]{6})\|(.+?)\}\}/g, '<span class="md-color" style="color:$1">$2</span>');

      codeTokens.forEach((html, index) => {

        const right = cell.endsWith(":");

      html += "</tr></thead><tbody>";
      rows.forEach(row => {
        html += "<tr>";
        header.forEach((_, idx) => {

      });

      return { html, nextIndex: i };

          continue;
        }

        const task = /^\s*[-*]\s+\[( |x|X)\]\s+(.+)$/.exec(line);
        if (task) {
          flushParagraph();
          openList("ul");

          out.push(`<li><input type="checkbox" disabled${checked}> ${processInline(task[2])}</li>`);
          continue;
        }

        const ul = /^\s*[-*+]\s+(.+)$/.exec(line);
        if (ul) {
          flushParagraph();
          openList("ul");
          out.push(`<li>${processInline(ul[1])}</li>`);
          continue;
        }

        const ol = /^\s*\d+\.\s+(.+)$/.exec(line);
        if (ol) {
          flushParagraph();
          openList("ol");
          out.push(`<li>${processInline(ol[1])}</li>`);
          continue;
        }

        paragraph.push(line.trim());
      }

      if (inCode) {
        out.push(renderCodeBlock(codeLang, codeLines.join("\n")));
      }

      flushParagraph();
      closeList();

      return out.join("\n");
    }

    function render() {

        lineStart,
        lineEnd,

      } else if (orderedMatch) {

        nextPrefix = `${orderedMatch[1]}${nextNumber}${orderedMatch[3]} `;
        emptyCurrentListItem = orderedMatch[4].trim() === "" && after.trim() === "";
        currentPrefixLength = orderedMatch[0].length - orderedMatch[4].length;
      } else if (unorderedMatch) {
        nextPrefix = `${unorderedMatch[1]}${unorderedMatch[2]} `;
        emptyCurrentListItem = unorderedMatch[3].trim() === "" && after.trim() === "";
        currentPrefixLength = unorderedMatch[0].length - unorderedMatch[3].length;
      } else if (quoteMatch) {
        nextPrefix = quoteMatch[1];
        emptyCurrentListItem = quoteMatch[2].trim() === "" && after.trim() === "";
        currentPrefixLength = quoteMatch[1].length;

        const removable = lineContent.slice(0, currentPrefixLength);

function changeSelectedLinesIndent(direction) {

    if (!line.trim()) {

    if (direction === "indent") {

      totalDelta += indent.length;

      return line.slice(indent.length);

      totalDelta -= 1;
      return line.slice(1);

    if (line.startsWith(" ")) {
      if (index === 0) {
        firstLineDelta -= 1;
      }

      totalDelta -= 1;
      return line.slice(1);
    }

    return line;

  editor.selectionStart = Math.max(lineStart, start + firstLineDelta);
  editor.selectionEnd = Math.max(editor.selectionStart, end + totalDelta);

  scheduleRender();

      const hh = pad2(date.getHours());
      const min = pad2(date.getMinutes());
      return `${yyyy}${mm}${dd}_${hh}${min}`;
    }

    function ensureCreatedAt(reset = false) {
      if (reset || !localStorage.getItem(CREATED_AT_KEY)) {
        localStorage.setItem(CREATED_AT_KEY, new Date().toISOString());
      }
      return localStorage.getItem(CREATED_AT_KEY);
    }

    function getDocumentTitle() {
      const h1 = editor.value.match(/^#\s+(.+)$/m);
      if (h1 && h1[1].trim()) return h1[1].trim();

      const h2 = editor.value.match(/^##\s+(.+)$/m);
      if (h2 && h2[1].trim()) return h2[1].trim();

      const firstNonEmpty = editor.value
        .split("\n")
        .map(line => line.replace(/^#+\s*/, "").trim())
        .find(Boolean);

      return firstNonEmpty || "無題";
    }

    function buildAutoBaseName() {
      const title = sanitizeFilename(getDocumentTitle()) || "無題";
      const createdAt = ensureCreatedAt(false);
      return sanitizeFilename(`${title}_${formatDateForFilename(createdAt)}`) || `memo_${formatDateForFilename(createdAt)}`;
    }

    function updateFilenameFromTitle() {
      const input = document.getElementById("filenameInput");
      if (!input) return;
      input.value = buildAutoBaseName();
    }

    function isAutoFilenameEnabled() {
      return document.getElementById("autoFilename")?.checked !== false;
    }

    function getSaveBaseName() {
      const input = document.getElementById("filenameInput");
      if (isAutoFilenameEnabled()) {
        const autoName = buildAutoBaseName();
        if (input) input.value = autoName;
        return autoName;
      }

      const typed = sanitizeFilename(input?.value || "");
      if (typed) return typed;

      const autoName = buildAutoBaseName();
      if (input) input.value = autoName;
      return autoName;
    }

    function withExtension(baseName, extension) {
      const cleanExt = extension.replace(/^\./, "");
      const cleanBase = sanitizeFilename(baseName).replace(/\.(md|markdown|html|htm)$/i, "");
      return `${cleanBase || buildAutoBaseName()}.${cleanExt}`;
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    const IMAGE_COMPRESS_CONFIG = {
      maxWidth: 1600,
      maxHeight: 1600,
      compressOverBytes: 700 * 1024,
      preferredType: "image/webp",
      fallbackType: "image/jpeg",
      quality: 0.82
    };

    function normalizeImageName(name) {
      return String(name || "image")
        .replace(/\.[^.]+$/, "")
        .replace(/[\\/:*?"<>|#%&{}$!'@+`=]/g, "_")
        .replace(/\s+/g, "_")
        .slice(0, 80) || "image";
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    function loadImageFromBlob(blob) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("画像を読み込めませんでした"));
        };
        img.src = url;
      });
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), type, quality);
      });
    }

    function calcResizeSize(width, height, maxWidth, maxHeight) {
      const scale = Math.min(1, maxWidth / width, maxHeight / height);
      return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale)),
        scaled: scale < 1
      };
    }

    function isCompressibleRaster(file) {
      return ["image/png", "image/jpeg", "image/jpg", "image/webp", "image/bmp"].includes(file.type);
    }

    async function compressImageIfNeeded(file) {
      if (!isCompressibleRaster(file)) {
        return {
          blob: file,
          dataUrl: await readFileAsDataUrl(file),
          compressed: false,
          originalBytes: file.size,
          finalBytes: file.size,
          width: null,
          height: null
        };
      }

      try {
        const img = await loadImageFromBlob(file);
        const resize = calcResizeSize(
          img.naturalWidth || img.width,
          img.naturalHeight || img.height,
          IMAGE_COMPRESS_CONFIG.maxWidth,
          IMAGE_COMPRESS_CONFIG.maxHeight
        );

        const shouldCompress = resize.scaled || file.size > IMAGE_COMPRESS_CONFIG.compressOverBytes;
        if (!shouldCompress) {
          return {
            blob: file,
            dataUrl: await readFileAsDataUrl(file),
            compressed: false,
            originalBytes: file.size,
            finalBytes: file.size,
            width: img.naturalWidth || img.width,
            height: img.naturalHeight || img.height
          };
        }

        const canvas = document.createElement("canvas");
        canvas.width = resize.width;
        canvas.height = resize.height;
        const ctx = canvas.getContext("2d", { alpha: true });
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";

        ctx.drawImage(img, 0, 0, resize.width, resize.height);

        let blob = await canvasToBlob(
          canvas,
          IMAGE_COMPRESS_CONFIG.preferredType,
          IMAGE_COMPRESS_CONFIG.quality
        );

        if (!blob) {
          blob = await canvasToBlob(
            canvas,
            IMAGE_COMPRESS_CONFIG.fallbackType,
            IMAGE_COMPRESS_CONFIG.quality
          );
        }

        if (!blob || blob.size >= file.size) {
          return {
            blob: file,
            dataUrl: await readFileAsDataUrl(file),
            compressed: false,
            originalBytes: file.size,
            finalBytes: file.size,
            width: img.naturalWidth || img.width,
            height: img.naturalHeight || img.height
          };
        }

        return {
          blob,
          dataUrl: await blobToDataUrl(blob),
          compressed: true,
          originalBytes: file.size,
          finalBytes: blob.size,
          width: resize.width,
          height: resize.height
        };
      } catch (error) {
        console.warn(error);
        return {
          blob: file,
          dataUrl: await readFileAsDataUrl(file),
          compressed: false,
          originalBytes: file.size,
          finalBytes: file.size,
          width: null,
          height: null
        };
      }
    }

    function getImageFilesFromClipboard(event) {
      const files = Array.from(event.clipboardData?.files || [])
        .filter(file => file.type && file.type.startsWith("image/"));

      const itemFiles = Array.from(event.clipboardData?.items || [])
        .filter(item => item.kind === "file" && item.type && item.type.startsWith("image/"))
        .map(item => item.getAsFile())
        .filter(Boolean);

      const merged = [...files, ...itemFiles];
      const seen = new Set();
      return merged.filter(file => {
        const key = `${file.name}_${file.type}_${file.size}_${file.lastModified}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) return "-";
      if (bytes < 1024) return `${bytes}B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)}KB`;
      return `${(bytes / 1024 / 1024).toFixed(2)}MB`;
    }

    async function insertImageFiles(files) {
      const imageFiles = Array.from(files || []).filter(file => file.type && file.type.startsWith("image/"));
      if (!imageFiles.length) {
        showToast("画像ファイルがありません");
        return;
      }

      const parts = [];
      let originalTotal = 0;
      let finalTotal = 0;
      let compressedCount = 0;

      for (const file of imageFiles) {
        originalTotal += file.size;
        const result = await compressImageIfNeeded(file);
        finalTotal += result.finalBytes;
        if (result.compressed) compressedCount++;

        const alt = normalizeImageName(file.name || `screenshot_${Date.now()}`);
        parts.push(`![${alt}](${result.dataUrl})`);
      }

      insertAtCursor(`\n${parts.join("\n\n")}\n`, "", "");

      if (compressedCount > 0) {
        showToast(`画像${imageFiles.length}件を挿入。${compressedCount}件圧縮: ${formatBytes(originalTotal)} → ${formatBytes(finalTotal)}`);
      } else {
        showToast(`画像${imageFiles.length}件を挿入: ${formatBytes(finalTotal)}`);
      }
    }

      localStorage.setItem(AUTO_FILENAME_KEY, event.target.checked ? "1" : "0");
      if (event.target.checked) updateFilenameFromTitle();
      showToast(event.target.checked ? "自動命名をONにしました" : "自動命名をOFFにしました");
    });

    document.getElementById("filenameInput").addEventListener("input", () => {
      const auto = document.getElementById("autoFilename");
      if (auto && auto.checked) {
        auto.checked = false;
        localStorage.setItem(AUTO_FILENAME_KEY, "0");
      }
    });

    document.getElementById("copyMarkdown").addEventListener("click", async () => {
      await navigator.clipboard.writeText(editor.value);
      showToast("Markdownをコピーしました");
    });

    document.getElementById("clearAll").addEventListener("click", () => {
      const ok = confirm("編集中の内容をクリアします。localStorageの自動保存も上書きされます。よろしいですか？");
      if (!ok) return;
      editor.value = "";
      ensureCreatedAt(true);
      updateFilenameFromTitle();
      render();
      showToast("クリアしました");
    });


    document.getElementById("uploadImage").addEventListener("click", () => {
      document.getElementById("imageInput").click();
    });

    document.getElementById("imageInput").addEventListener("change", async (event) => {
      await insertImageFiles(event.target.files);
      event.target.value = "";
    });

    editor.addEventListener("paste", async (event) => {
      const files = getImageFilesFromClipboard(event);
      if (!files.length) return;
      event.preventDefault();
      await insertImageFiles(files);
    });

    editor.addEventListener("dragover", (event) => {
      event.preventDefault();
    });

    editor.addEventListener("drop", async (event) => {
      const files = Array.from(event.dataTransfer?.files || []).filter(file => file.type.startsWith("image/"));
      if (!files.length) return;
      event.preventDefault();
      await insertImageFiles(files);
    });

    document.getElementById("fileInput").addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const text = await file.text();
      editor.value = text;
      ensureCreatedAt(true);
      const base = sanitizeFilename(file.name.replace(/\.(md|markdown|txt)$/i, ""));
      const filenameInput = document.getElementById("filenameInput");
      if (filenameInput && base && !isAutoFilenameEnabled()) filenameInput.value = base;
      if (isAutoFilenameEnabled()) updateFilenameFromTitle();
      render();
      showToast("読み込みました");
      event.target.value = "";
    });

    preview.addEventListener("click", async (event) => {
      const button = event.target.closest(".copy-code");
      if (!button) return;
      const code = button.closest(".code-block").querySelector("pre code").textContent;
      await navigator.clipboard.writeText(code);
      button.textContent = "コピー済み";
      setTimeout(() => button.textContent = "コピー", 1200);
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth <= 860 && !layout.classList.contains("mobile-preview") && !layout.classList.contains("mobile-toc")) {
        layout.classList.add("mobile-editor");
      } else if (window.innerWidth > 860) {
        layout.classList.remove("mobile-editor", "mobile-toc", "mobile-preview");
      }
    });

    editor.value = localStorage.getItem(STORAGE_KEY) || initialMarkdown;
    ensureCreatedAt(false);

    const autoFilename = document.getElementById("autoFilename");
    const savedAuto = localStorage.getItem(AUTO_FILENAME_KEY);
    if (autoFilename && savedAuto !== null) {
      autoFilename.checked = savedAuto !== "0";
    }

    updateFilenameFromTitle();

    const savedAppBgColor = localStorage.getItem(APP_BG_COLOR_KEY);
    if (savedAppBgColor) {
      applyAppBackgroundColor(savedAppBgColor);
    }

    const savedTocVisible = localStorage.getItem(TOC_VISIBLE_KEY);
    setTocVisible(savedTocVisible !== "0");

    if (window.innerWidth <= 860) {
      layout.classList.add("mobile-editor");
    }
    render();
  </script>
</body>
</html>
